region = "ru-RU"

[modules]
left = ["Workspaces"]
center = ["WindowTitle"]
right = [["SystemInfo", "KeyboardLayout", "Tempo", "Tray", "Settings"]]

[system_info]
indicators = ["Cpu", "Memory"]
interval = 5

[system_info.cpu]
warn_threshold = 60
alert_threshold = 80

[system_info.memory]
warn_threshold = 70
alert_threshold = 85

[keyboard_layout]
labels = { "English (US)" = "EN", "Russian" = "RU" }

[settings]
lock_cmd = "hyprlock"
logout_cmd = "niri msg action quit"
indicators = ["Battery", "Network", "Bluetooth", "Audio", "Microphone", "Brightness"]
battery_format = "IconAndPercentage"
battery_hide_when_full = false
peripheral_expanded_by_default = true
